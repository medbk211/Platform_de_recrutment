services:
  mysql:
    image: mysql:8.4
    container_name: recruitment_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: recruitment_platform
      MYSQL_USER: recruitment_user
      MYSQL_PASSWORD: recruitment_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

